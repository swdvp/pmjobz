<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM Jobz</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen flex flex-col shadow-sm border-x border-slate-100">

        <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 z-50">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-900">PM Jobz</h1>
                </div>
                <span class="text-xs font-medium px-2 py-0.5 bg-indigo-50 text-red-600 rounded-full border border-indigo-100">Prototype</span>
            </div>

            <div class="relative mb-3">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by title or company..."
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-slate-800 placeholder-slate-400"
                >
                <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div id="filterContainer" class="flex flex-wrap gap-2 pt-1 pb-1"></div>
        </header>

        <main class="flex-1 p-4 space-y-3" id="jobFeed">
            <div id="loadingState" class="text-center py-12 px-4">
                <div class="inline-block w-6 h-6 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                <div class="text-slate-400 text-sm font-medium">Loading...</div>
            </div>
        </main>

    </div>

    <script>
        let jobsDatabase = [];
        let dynamicSkillsList = ["All"];
        let activeFilter = "All";
        let searchQuery = "";

        const searchInput = document.getElementById('searchInput');
        const filterContainer = document.getElementById('filterContainer');
        const jobFeed = document.getElementById('jobFeed');

        function parseJobSkills(job) {
            if (!job.skills) return [];
            if (Array.isArray(job.skills)) return job.skills;
            if (typeof job.skills === 'string') {
                return job.skills.split(',').map(s => s.trim()).filter(Boolean);
            }
            return [];
        }

        function getCleanLabel(rawSkill) {
            // You can leave this as is
            return rawSkill;
        }

        // Replace your existing fetchLiveJobs function with this:
        async function fetchJobs() {
            try {
                // Change the URL to point to your local file
                const response = await fetch('jobs.json');

                if (!response.ok) {
                    throw new Error("Could not load jobs.json");
                }

                const data = await response.json();

                // Directly map the data.json array
                jobsDatabase = data.map(record => ({
                    title: record.title || "Untitled Position",
                    company: record.company || "Unknown Company",
                    url: record.url || "#",
                    skills: record.skills || []
                }));

                const extractedSkills = new Set();
                jobsDatabase.forEach(job => {
                    job.skills.forEach(skill => extractedSkills.add(skill));
                });

                dynamicSkillsList = ["All", ...Array.from(extractedSkills).sort()];

                renderFilters();
                renderJobs();
            } catch (error) {
                console.error("Local Load Error:", error);
                jobFeed.innerHTML = `
                    <div class="text-center py-12 px-4 border border-rose-100 bg-rose-50/50 rounded-2xl">
                        <div class="text-rose-600 font-semibold text-sm mb-1">Local Load Failed</div>
                        <p class="text-slate-500 text-xs max-w-xs mx-auto">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderFilters() {
            // 1. Filter out empty strings or non-string types
            // 2. Ensure we only show "All" and valid skill labels
            const validSkills = dynamicSkillsList.filter(skill =>
                typeof skill === 'string' && skill.trim().length > 0
            );

            filterContainer.innerHTML = validSkills.map(skill => `
                <button onclick="setFilter('${skill}')" class="px-3 py-1.5 rounded-full text-xs font-semibold tracking-wide transition-all ${activeFilter === skill ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'}">
                    ${getCleanLabel(skill)}
                </button>
            `).join('');
        }

        function renderJobs() {
            const filteredJobs = jobsDatabase.filter(job => {
                const matchesSearch = job.title.toLowerCase().includes(searchQuery) || job.company.toLowerCase().includes(searchQuery);
                const matchesFilter = activeFilter === "All" || (job.skills && job.skills.includes(activeFilter));
                return matchesSearch && matchesFilter;
            });

            // Apply the 500ms delay before updating the DOM
            setTimeout(() => {
                jobFeed.innerHTML = filteredJobs.map(job => {
                    const jobSkills = parseJobSkills(job); // Kept your existing parsing logic
                    return `
                        <div onclick="window.open('${job.url}', '_blank')" class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm hover:border-slate-200 transition-all cursor-pointer">

                            <div class="text-[13px] font-bold text-slate-400 uppercase tracking-wider mb-1">
                                ${job.company}
                            </div>

                            <h3 class="text-[15px] font-semibold text-indigo-800 mb-3 leading-snug">
                                ${job.title}
                            </h3>

                            <div class="flex flex-wrap gap-1.5">
                                ${(job.skills || []).filter(skill => typeof skill === 'string').map(skill => `
                                    <span class="text-[12px] font-medium px-2.5 py-1 rounded bg-slate-100 text-slate-600 tracking-wide">
                                        ${getCleanLabel(skill)}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            }, 200); // 0.5 seconds delay here
        }

        window.setFilter = (skill) => {
            // 1. Update the state immediately
            activeFilter = skill;

            // 2. Re-render the filters immediately so the button clicks feel responsive
            renderFilters();

            // 3. Delay the list update by 500ms (0.5 seconds)
            setTimeout(() => {
                renderJobs();
            }, 200);
        };
        searchInput.addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderJobs(); });

        fetchJobs();
    </script>
</body>
</html>
